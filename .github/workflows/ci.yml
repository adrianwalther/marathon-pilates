name: CI

# Type-check + run the Vitest suite on every push/PR to main, so regressions
# are caught before they reach the beta. These steps need no secrets/env
# (build + runtime env live in Vercel). The app lives in src/web.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Type-check & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/web/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
